[advisories]
db-path = "https://github.com/rustsec/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
unmaintained = "warn"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC"
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"